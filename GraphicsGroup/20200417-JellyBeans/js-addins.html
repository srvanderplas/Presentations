
<script>
        /* Get the modal*/
          var modalRed_Apple = document.getElementById('modalRed_Apple');
        /* Get the image and insert it inside the modal - use its 'alt' text as a caption*/
          var imgRed_Apple = document.getElementById('imgRed_Apple');
          var modalImgRed_Apple = document.getElementById('imgmodalRed_Apple');
          var captionTextRed_Apple = document.getElementById('captionRed_Apple');
          imgRed_Apple.onclick = function(){
            modalRed_Apple.style.display = 'block';
            modalImgRed_Apple.src = this.src;
            captionTextRed_Apple.innerHTML = this.alt;
          }
          /* When the user clicks on the modalImg, close it*/
          modalImgRed_Apple.onclick = function() {
            modalRed_Apple.style.display = 'none';
          }
</script>
