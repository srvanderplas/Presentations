Because (for me, at least) the beginning of the pandemic seems like it was a decade ago, I thought I'd refresh your memory of the approximate timeline of major events. In attempting to nail these events down, I came across an animation of the New York Times front page articles which are covid-related. You can see that from the end of January to the end of March, the story slowly takes over almost the entire front page.

---
## Interest in news-related graphs

![](image/google_trends_News_graph.png)

???

During that time, almost everyone I knew was constantly checking out this map or this chart of cases in the states or in countries across the world. Data bears this out - searches for news-related graphs spike at the end of February and slowly decrease back to near-normal levels in June. 

It wasn't just that we were all paying attention to charts more during this period - there was also an impressive array of different ways of showing the available data. Today, I'm going to look at a couple of broad classes of charts with different goals and (ideally) different audiences, and discuss the advantages and disadvantages of each. 


---
class: middle,center,inverse
# High Detail

### Show me all of the data

???

The first class of charts I'm going to discuss is what I've started thinking of as "paleo" data - the chart generally shows the data in more-or-less whole, unprocessed form, in the same way that a health department might track the data. Like paleo recipes, these charts show the data in a form that has only enough processing to make it edible. 

For most of these charts, I'm going to focus on the form of the chart, rather than the specific implementations in the media, both because I think the interesting part is what is plotted, rather than the specific aesthetics, and because I think it will make it easier to compare different charts. Throughout this presentation, I'll be using the data from the NY Times. 

In the interests of showing only enough information to make the point, I'll be showing this data based on US states, and in most cases, I'll be picking a handful of states from different regions to showcase the important pieces of each chart.


---
## Changes over Time

&lt;img src="index_files/figure-html/unnamed-chunk-2-1.png" width="1800" /&gt;

.bottom[Data from [The New York Times github repository](https://github.com/nytimes/covid-19-data), based on reports from state and local health agencies.]

???

The simplest plots show the date compared to the number of deaths or cases. Ideally, since there is some effect of weekday on case count and death count reporting, these plots are smoothed by averaging or summation over a multiple of 7 days.

When the y axis scale is linear, we can more easily read counts off (and understand what's going on), but there is the compression factor: the only state we can clearly read from the chart is New York, and while it is dramatic, that doesn't help us compare very well. 

But there are a couple of other factors at play here that are 1) persistent across many types of covid charts, and 2) much more important in affecting our ability to read the charts. We can, using various interactive graphs, mitigate the scale issues. But, fundamentally, we have bigger problems. 
---
## Exponential Growth

&lt;img src="index_files/figure-html/exp-growth-1.png" width="1200" class='pull-left' /&gt;

.pull-right[
- People are consistently awful at forecasting exponential growth

- Forecasts always underestimate the next point


.tiny[(Goodwin and Wright, 1994; Timmers and Wagenaar, 1977)]

]

.bottom[Data from [The New York Times github repository](https://github.com/nytimes/covid-19-data), based on reports from state and local health agencies.]

???

This graph shows daily reported cases of COVID. Sadly, thanks to recent events, I have a whole host of different states which make it easy to demonstrate what exponential growth looks like. 

When we look at these types of plots, it seems pretty clear that there is exponential (ish) growth occurring. It's relatively natural to extend the line in a linear way (and for Florida and Texas, that's nearly a vertical line.) The problem is, this vastly underestimates the exponential growth, and while we can attempt to counter the effect by adjusting our predictions upward, we never actually manage to forecast exponential growth accurately when we're using charts and visually extending the line. 

The two papers I've cited here discuss this phenomenon - it likely occurs because we anchor our predictions based on the previous two or 3 data points. In a plot like this, those data points are enough to give us an estimate of a linear trend, but they're wholly insufficient to estimate exponential growth. This seems to be a mental shortcut taken because we can't quite wrap our head around exponential growth rates. It's not an intuitive thing.

The natural way to correct for graphs showing exponential growth is to use a log y-axis scale, which solves some problems and creates a whole host of new problems.

## Log Scales


&lt;img src="index_files/figure-html/unnamed-chunk-4-1.png" width="1800" /&gt;
.bottom[Data from [The New York Times github repository](https://github.com/nytimes/covid-19-data), based on reports from state and local health agencies.]

???

It's much easier to compare the trajectory of the different states outbreaks when we look at the log-scale information, and, as a bonus, because we devote more vertical space to lower values, we can easily separate the lines from Texas, Florida, Washington, Iowa, and Utah.

We're again reading the slope off of the chart as the "useful information" here -- the slope indicates the change in the number of people dying (or being diagnosed covid) over time. 


---
## Comparisons 
&lt;img src="index_files/figure-html/unnamed-chunk-5-1.png" width="1800" /&gt;

.bottom[Data from [The New York Times github repository](https://github.com/nytimes/covid-19-data), based on reports from state and local health agencies.]

???

This comes at a cost, though - our intuition for what is being shown is compromised. The number of deaths in Texas and Washington in mid-March look very similar, but in fact, there is a factor of 10 difference between them. Similarly, in mid June, a similar size gap between Washington and Texas counts occur (in the other direction), and while the ratio is the same, I'm not convinced everyone reads that correctly. 

There are two factors at play here - the not-so-intuitive log scale = multiplicative effect, and also the sine illusion, which makes it very difficult to assess the vertical distance between curves. 

In the reduced-clutter version, you can also get a sense for the amount of mental effort it takes to decode a graph with many, many lines on it and get meaningful information out of it. The default in most of the online versions I've seen is to show 10+ curves for different states or countries, which is a *lot* of information. On top of that, most of the online versions provide additional information via mouseover and allow filtering based on state(s) of interest, which helps in some ways but adds cognitive load. 

---
## Log scales and Explanations

&gt; This chart uses a logarithmic scale, which is meant to emphasize rate of change and allows for the display of a wide range of numbers. **Every axis line is 10 times greater than the previous one.** In the new daily cases chart, the x-axis uses total confirmed cases on a logarithmic scale rather than date to underscore the overall size of a state's outbreak relative to its daily growth. 

- [NPR Explanation](https://www.npr.org/sections/health-shots/2020/03/16/816707182/map-tracking-the-spread-of-the-coronavirus-in-the-u-s)


&gt; The vertical axis of our charts are shown using a logarithmic scale, where **the same distance on the scale represents multiplying or dividing by the same amount, instead of adding or subtracting the same amount as is the case with a linear scale.** Log scales are particularly suited to displaying trends in relative rates of change, like a virus spreading. 

- [Financial Times](https://ig.ft.com/coronavirus-chart/?areas=usa&amp;areas=gbr&amp;areasRegional=usny&amp;areasRegional=usca&amp;areasRegional=usfl&amp;areasRegional=ustx&amp;cumulative=0&amp;logScale=1&amp;perMillion=0&amp;values=deaths)


???

When the goal is to communicate with the general public, though, you have to be somewhat cautious about how you display information and what scaffolding you provide. I've pulled the two descriptions I could find from sites which are using log scales -- most sites didn't really have an explanation or scaffolding to show. 

I wish I had data, or guidelines, or any real information on the use of log scales and how we perceive them, but I've been looking for papers for two months, and haven't found any experiment which examines how people read and perceive graphics that use log scales, compared with linear scales. If you know of one, please message me by email, twitter, smoke signals... Either way, hopefully there will be such a paper within the next year. 

---
## Log scales, COVID-19, and Time

.pull-left[
- It's estimated that [10% of COVID-19 cases lead to 80% of the spread](https://www.sciencemag.org/news/2020/05/why-do-some-covid-19-patients-infect-many-others-whereas-most-don-t-spread-virus-all)
  - Most people infect 0-1 others
  - Super spreading events make up the difference
  
- Under these conditions, most transmission chains die out on their own

- Log scales can make it harder to detect exponential increases due to superspreading or changes in policy later in the epidemic
]
&lt;img src="index_files/figure-html/unnamed-chunk-6-1.png" width="1200" class="pull-right" /&gt;

???

One other problem with log scales has been increasingly important over time. What we generally care about is the recent change in cases/deaths over time. Unfortunately, log scales show a percent change that is based on the total number of cases. This is usually a good thing, but COVID is interesting. 

Once cases die off in an area to a baseline level of spread that might represent sustained, continuing, constant levels of transmission within e.g. family or work (but not sustained community spread), we end up with what appears to be constant-ish new cases over time. 

If exponential spread then starts up again, it's hard to recognize that increase on a log scale. The picture on the right shows 3 baseline levels of sustained transmission, with the same amount of exponential spread. It's clear

## Virus time or Human time?


&lt;img src="index_files/figure-html/unnamed-chunk-7-1.png" width="1200" class='pull-left' /&gt;
&lt;img src="index_files/figure-html/unnamed-chunk-8-1.png" width="1200" class='pull-right' /&gt;

.bottom[Data from [The New York Times github repository](https://github.com/nytimes/covid-19-data), based on reports from state and local health agencies.]

???

I'm not sure if you noticed, but I played a bit of a trick in the previous slides: I've been switching back and forth between an x-axis that tracks "days since 100 cases" in each state, and the actual calendar date. 

I like to think of these two axes as showing virus time and human time. They both have advantages - graphs that show days since N cases allow you to compare outbreaks that started at different times, which can be useful in assessing e.g. which measures at the government level are useful to contain the virus, and how different containment methods have been applied. Personally, I find this to be much more useful at the country level than the state level, because outbreaks in e.g. China, Italy, and Spain followed the same initial course as the outbreak in NYC, and as later outbreaks in Texas, Florida, and Arizona. 

But, it's also very important to be able to trace increases in cases across multiple states back to single calendar events - easter, Memorial Day, 4th of July. This is complicated by a 1 or 2-week lag in case increases, but it's fairly easy to see that cases in Nebraska increased not long after Easter, and again after July 4th. Not that there's causation there, but I can confirm that people were out and about more than usual in my part of the state, at least. 

One problem I have is that the difference between these two graphs is *very* subtle, and I've gone out of my way to try to pick states where the epidemic has followed a different course. The other thing that I'm not fond of is that it's arguable that the 100 cases threshold is affected by population and population density - 100 people in Nebraska is a lot more signifcant than 100 people in New York or California. I've seen some people arguing that e.g. a forest fire will burn at the same rate regardless of the size of the forest initially, but these graphs are being used long after that initial part is relevant. So while the 100 cases threshold may have been useful early in the pandemic, it's perhaps less useful now. 

---
## Other Interesting Variations

&lt;img src="index_files/figure-html/unnamed-chunk-9.gif" width="2400" /&gt;

.bottom[[Interpreting graphs with log scales](https://ecologicallyoriented.wordpress.com/2014/03/20/interpreting-graphs-with-logarithmic-scales/) has examples of what log scales on each axis do to the spacing of the data.]
???

One of the other very interesting variations in plots I've seen takes time out of the equation entirely (for the static version) or animates the chart like the one I've included here. This chart shows the total progress of the epidemic over time; regions which suppress cases show steep declines in y, and resurgences look like bounces. It's an interesting paradigm, but I'm not convinced that it's that useful for a couple of reasons: First, it's probably the least useful when the epidemic isn't being controlled, because surges in cases take up less room on the chart in both dimensions - that is, the amount of space dedicated to an increase of 100 cases in the first portion of the epidemic is pretty large, but later in the epidemic, it isn't at all. 

On the bright side, though, there's really no need to scale this chart by per captia population, as what matters here is the trajectory of the epidemic over time. 

Another issue is that log-log charts don't show change very well - because both x and y are on log scale, many things that aren't linear will look linear. So while it's easy to make imprecise comparisons with this chart, it's much harder to see what exactly it means.

# Creative Circumvention of Scale Issues

---
## From Exponential to Frequency

&lt;img src="index_files/figure-html/unnamed-chunk-10-1.png" width="2400" /&gt;

???

One of the more interesting graphics I've seen on twitter was one which encoded covid deaths as time intervals to N cases. So if it takes 50 days to get to the first 10000 cases, and then 20,and then 5, and so on, the acceleration of pandemic progress is clear. I really, really like this idea, if only because it is one of the best ways I've seen to get around the exponential vs. log scale issue. The "pace" of the pandemic is perfectly clear while the number of spikes makes it obvious how many cumulative cases or deaths there have been. Shading in the triangles using deeper shades of a univariate color allows you to assess "total" subjectively by "amount of color".

I recreated the chart using a blue color scheme because the use of red and black in coloring is really problematic - it can cause panic, the connection to blood and death has an emotional impact, and while the emotional impact isn't bad, it's not necessary to communicate what we need to communicate here. 


---
## The Slow March to Herd Immunity

&lt;img src="index_files/figure-html/unnamed-chunk-11-1.png" width="2400" /&gt;

???

As with all of the graphics so far, though, we have this battle between comparing raw numbers/counts in a geographic region and comparing the population prevalence. So if we redo this graph as a % population, it's much more effective at showing the progress of the pandemic moving through the population, and it's much easier to compare e.g. the success of control measures in NY and CA with Arizona and Nebraska. I'd say that when the graph is arranged this way, it's more like we're showing the progress toward some sort of herd immunity - by the time we get to 1000 spikes, we're "done". God forbid.

# Low Detail

### Just tell us what to do

???

I love graphics, and data, but I'll confess that by about May, I was done. I just couldn't look at another one of these charts. I still wanted to know how bad things were in the areas of the country I care about - places where friends and family live, but I was so done with the case count graphics. Luckily for me, many outlets came up with very simple summary graphics, often using small multiple plots laid out geographically in a fairly clear repurposing of graphics which were used to show election data. Because the spread of coronavirus is pretty similar to the spread of a candidate's popularity, right?   

---
## State-Level Progress

&lt;div class="wrap"&gt;
&lt;iframe class="scale-frame" src = "https://www.covidexitstrategy.org/#hero-chart" width = "100%" height = "500px"/&gt;&lt;/div&gt;

???

Perceptually, this map is a mess for colorblind individuals, because I can't differentiate the green from the light and dark red shades. Statistically, it's not 100% clear what metrics are being used to decide which states are in which category - the site mentions broad themes but doesn't provide any sort of formula that we might use to recreate the graph. So while it loses points for accessibility and transparency, it is a nice map that was very effective at communicating one thing.

---
## State-Level Progress

<blockquote class="twitter-tweet" data-width="550" data-lang="en" data-dnt="true" data-theme="light"><p lang="en" dir="ltr">We invented a new color. Great. <a href="https://t.co/oELH0oOrz4">https://t.co/oELH0oOrz4</a></p>&mdash; Andy Slavitt @ 🏡 (@ASlavitt) <a href="https://twitter.com/ASlavitt/status/1282024016254042112?ref_src=twsrc%5Etfw">July 11, 2020</a></blockquote>


???

On July 10 the calculations that contributed to the map changed -- they addded a darker shade of red. There's something bigger communicated when you have to add a new color to the map to describe how bad things have gotten, and that broader theme is why this map is first in the low-detail category.
